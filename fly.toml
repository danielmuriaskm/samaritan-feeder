app = "samaritan-feeder"
primary_region = "lhr"  # London — co-located with samaritan-server (lhr) + EU residency

[build]

[env]
  PORT = "3001"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  # /health is public (auth middleware exempts it) — enables zero-downtime
  # bluegreen deploys + restart-on-secret-change.
  [[http_service.checks]]
    grace_period = "20s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/health"

[[vm]]
  size = "shared-cpu-2x"
  memory = "2gb"

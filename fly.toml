app = "samaritan-feeder"
primary_region = "lhr"  # London — co-located with samaritan-server (lhr) + EU residency

[build]

[env]
  PORT = "3001"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  # /health is public (auth middleware exempts it) — enables zero-downtime
  # bluegreen deploys + restart-on-secret-change.
  [[http_service.checks]]
    grace_period = "20s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/health"

[[vm]]
  # Downsized 2026-06-22 from shared-cpu-2x/2gb: the webcam/ip-camera JSON libraries
  # were moved out of heap to the public.cameras PostGIS table (cameraStore.ts), so
  # steady-state RSS is ~100MB. NOTE: keep in sync with the live machine — `fly scale
  # vm/memory` does NOT write back here, and a deploy re-applies whatever this says.
  size = "shared-cpu-1x"
  memory = "512mb"

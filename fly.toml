app = "samaritan-feeder"
primary_region = "lhr"  # London — co-located with samaritan-server (lhr) + EU residency

[build]

[env]
  PORT = "3000"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  size = "shared-cpu-2x"
  memory = "2gb"

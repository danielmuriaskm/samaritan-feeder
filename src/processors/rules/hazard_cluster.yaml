# Declarative rule for samaritan-feeder's rule engine (src/processors/ruleEngine.ts).
#
# Clean-room note: the collect/aggregate/analysis/headline rule shape is inspired
# by SpiderFoot's correlation DSL (smicallef/spiderfoot, MIT) but reimplemented
# for samaritan's own event model. This file is original.

id: hazard_cluster

version: 1

meta:
  name: Hazard feeds converging on one area
  description: >
    Multiple authoritative hazard / government feeds (USGS, NWS, GDACS, EONET,
    ReliefWeb, ...) reporting in the SAME ~1-degree geo cell. We collect events
    from the `hazard_gov` source family, group them by geo cell, and fire when at
    least 2 DISTINCT source KINDS (e.g. usgs + nws) land in one cell. Independent
    authoritative feed types converging on a location is a strong corroboration
    signal that something real is happening there (earthquake + weather alert +
    disaster bulletin).
  risk: HIGH

# Collect: authoritative hazard/gov events. (geoCell resolution drops any that
# lack coordinates, so we don't need an explicit location matcher.)
collect:
  - method: exact
    field: sourceFamily
    value: hazard_gov

# Group by ~1-degree geo cell.
aggregate:
  field: geoCell

# Fire when at least 2 DISTINCT source kinds converge on the cell (count_unique on
# sourceKind), so repeated polls of one feed don't fabricate convergence.
analysis:
  method: threshold
  minCount: 2
  distinctField: sourceKind

headline: "Multiple hazard feeds converging on cell {field} ({metric} distinct feeds)"
